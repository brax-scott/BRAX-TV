<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRAX-STREAM V6 | NO BOXES</title>
    <style>
        body { background: #000; color: #ffcc00; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; text-align: center; }
        header { padding: 25px; border-bottom: 3px solid #ffcc00; font-size: 28px; font-weight: 900; letter-spacing: 2px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: #111; border-radius: 10px; overflow: hidden; border: 1px solid #333; transition: 0.4s; cursor: pointer; }
        .card:hover { border-color: #ffcc00; transform: translateY(-5px); box-shadow: 0 5px 15px rgba(255, 204, 0, 0.4); }
        .card img { width: 100%; height: 220px; object-fit: cover; }
        .card h3 { font-size: 13px; padding: 10px; color: white; margin: 0; }
        .btn-play { background: #ffcc00; color: black; border: none; padding: 10px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>BRAX<span>-CINEMA</span></header>

<div class="grid" id="movieList">
    <p>Inapakia Movie za Kishua... (Hakikisha MB zipo)</p>
</div>

<script>
    // API ya Siri (TMDB) ya kuvuta picha halisi
    const API_KEY = '8265b3d02a5443584856312686616b7f';

    async function startApp() {
        try {
            // Tunavuta Movie zinazotrend LEO
            const res = await fetch(`https://api.themoviedb.org/3/trending/movie/day?api_key=${API_KEY}`);
            const data = await res.json();
            const container = document.getElementById('movieList');
            container.innerHTML = '';

            data.results.forEach(m => {
                const card = document.createElement('div');
                card.className = 'card';
                
                // Hapa ndipo ujanja ulipo: Tunafungua "Window Mpya" ili GitHub isiback
                // Server ya vidsrc.xyz ndio tishio kwa sasa
                const streamLink = `https://vidsrc.xyz/embed/movie/${m.id}`;

                card.innerHTML = `
                    <img src="https://image.tmdb.org/t/p/w500${m.poster_path}">
                    <h3>${m.title}</h3>
                    <button class="btn-play">WATCH NOW (HD)</button>
                `;
                
                card.onclick = () => {
                    // Hii inafungua tab mpya na kucheza movie papo hapo!
                    window.open(streamLink, '_blank');
                };
                
                container.appendChild(card);
            });
        } catch (e) {
            document.getElementById('movieList').innerHTML = "Hitilafu! Refresh page.";
        }
    }

    startApp();
</script>
</body>
</html>
